Anchor_PR: &Anchor_PR {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.g.cn/generate_204', interval: 300}, filter: "^(?!.*(到期|过期|剩余|网址|官网|邮箱|订阅|套餐|流量|说明|重置)).*$"}
Anchor_OB: &Anchor_OB {type: select, proxies: [一键代理, 香港故转, 台湾故转, 日本故转, 韩国故转, 新加坡故转, 美国故转, 英国故转, 德国故转, 欧洲故转, 香港自动, 台湾自动, 日本自动, 韩国自动, 新加坡自动, 美国自动, 英国自动, 德国自动, 欧洲自动, 香港手动, 台湾手动, 日本手动, 韩国手动, 新加坡手动, 美国手动, 英国手动, 德国手动, 欧洲手动, 其他手动, DIRECT, REJECT]}
Anchor_HS: &Anchor_HS {type: select, include-all: true}
Anchor_FB: &Anchor_FB {type: fallback, url: 'https://www.g.cn/generate_204', interval: 300, lazy: false, timeout: 2000, max-failed-times: 3, hidden: true}
Anchor_UT: &Anchor_UT {type: url-test, url: 'https://www.g.cn/generate_204', interval: 300, lazy: false, tolerance: 50, timeout: 2000, max-failed-times: 3, hidden: true, include-all: true}
Anchor_DN: &Anchor_DN {type: http, interval: 86400, behavior: domain, format: mrs}
Anchor_IP: &Anchor_IP {type: http, interval: 86400, behavior: ipcidr, format: mrs}
Anchor_CL: &Anchor_CL {type: http, interval: 86400, behavior: classical, format: text}

Anchor_HK: &Anchor_HK '^(?i)(?=.*(香港|🇭🇰|\bHK\b|Hong(?:\s?Kong)?|HKG)).*$'
Anchor_TW: &Anchor_TW '^(?i)(?=.*(台湾|台灣|🇹🇼|\bTW\b|\bTPE\b|\bTSA\b|\bKHH\b|taiwan|TPE|TSA|KHH)).*$'
Anchor_JP: &Anchor_JP '^(?i)(?=.*(日本|🇯🇵|\bJP\b|Japan|NRT|HND|KIX|CTS|FUK)).*$'
Anchor_KR: &Anchor_KR '^(?i)(?=.*(韩国|韓國|🇰🇷|首尔|首爾|\bKR\b|\bKOR\b|Korea|Seoul|South)).*$'
Anchor_SG: &Anchor_SG '^(?i)(?=.*(新加坡|🇸🇬|\bSG\b|Singapore|SIN|XSP)).*$'
Anchor_US: &Anchor_US '^(?i)(?=.*(美国|美國|🇺🇸|\bUS\b|\bUSA\b|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$'
Anchor_GB: &Anchor_GB '^(?i)(?=.*(英国|英國|🇬🇧|\bGB\b|\bUK\b|London|LHR|LGW)).*$'
Anchor_DE: &Anchor_DE '^(?i)(?=.*(德国|德國|🇩🇪|\bDE\b|Germany|Frankfurt|FRA|MUC)).*$'
Anchor_EU: &Anchor_EU '^(?i)(?=.*(奥地利|比利时|保加利亚|希腊|爱尔兰|意大利|荷兰|波兰|西班牙|瑞典|CDG|AMS|MAD|BCN|FCO|BRU)).*$'
Anchor_OT: &Anchor_OT '^(?!.*(DIRECT|香港|台湾|日本|韩国|新加坡|美国|英国|德国|奥地利|比利时|保加利亚|希腊|爱尔兰|意大利|荷兰|波兰|西班牙|瑞典|🇭🇰|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇩🇪|HK|TW|SG|JP|KR|US|GB|UK|DE)).*$'

proxy-providers:
  机场A: {<<: *Anchor_PR, url: '这里填第一个订阅', override: {additional-prefix: '[A] '}}
  机场B: {<<: *Anchor_PR, url: '这里填第二个订阅', override: {additional-prefix: '[B] '}}

mixed-port: 7893
mode: rule
allow-lan: true
bind-address: "*"
tcp-concurrent: true
unified-delay: true
log-level: info
ipv6: true
profile: {store-selected: true, store-fake-ip: true}

external-controller: 0.0.0.0:9090
external-ui-name: zashboard
external-ui: ui
secret: ""
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-no-fonts.zip

tun:
  enable: true
  stack: mixed
  dns-hijack: [0.0.0.0:53]
  auto-detect-interface: true
  auto-route: true
  auto-redirect: true
  strict-route: false
  endpoint-independent-nat: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    QUIC: {ports: [443]}
    TLS: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880], override-destination: true}
  force-domain: ["+.netflix.com", "+.nflxvideo.net", "+.amazonaws.com", "+.media.dssott.com"]
  skip-domain: ["+.apple.com", "Mijia Cloud", "dlg.io.mi.com", "+.oray.com", "+.sunlogin.net", "+.push.apple.com"]

dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  respect-rules: false
  fake-ip-filter: ['*.lan', "rule-set:add_direct_domain", "rule-set:cn_domain"]
  nameserver: [114.114.114.114, 223.5.5.5]

proxy-groups:
  - {name: 一键代理, type: select, proxies: [香港故转, 台湾故转, 日本故转, 韩国故转, 新加坡故转, 美国故转, 英国故转, 德国故转, 欧洲故转, 香港自动, 台湾自动, 日本自动, 韩国自动, 新加坡自动, 美国自动, 英国自动, 德国自动, 欧洲自动, 香港手动, 台湾手动, 日本手动, 韩国手动, 新加坡手动, 美国手动, 英国手动, 德国手动, 欧洲手动, 其他手动, DIRECT, REJECT], icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Rocket.png}
  - {name: YouTube, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/YouTube.png}
  - {name: Google, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Google.png}
  - {name: ChatGPT, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/ChatGPT.png}
  - {name: GitHub, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/GitHub.png}
  - {name: OneDrive, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/OneDrive.png}
  - {name: Microsoft, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Microsoft.png}
  - {name: AppleTV, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/AppleTV.png}
  - {name: Apple, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Apple.png}
  - {name: TikTok, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/TikTok.png}
  - {name: Twitter, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Twitter.png}
  - {name: Telegram, <<: *Anchor_OB, icon: https://github.com/Seven1echo/Yaml/raw/main/icons/Telegram.png}
